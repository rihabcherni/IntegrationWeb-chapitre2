<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> activite 4 BienvenueState </title>
    <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <script type="text/babel">
 class BienvenueState extends  React.Component {
     constructor(props){
            super(props);
            let prenom= this.props.saisie.split(" ")[0];
            this.state={saisie:prenom}           
     }
     render(){
        return <h1>Bonjour {this.state.saisie}</h1>;
     }  
 }
    const elt =<BienvenueState saisie= "Foulen"/>;
    ReactDOM.render(elt,document.getElementById("root"));
</script>
<div id="root"></div>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemple d'utilisation d'arrow function</title>
</head>
<body>

    <h2>Fonction JS</h2>
    <p>Exemple  d'utilisation d'<b>arrow function</b> </p>
    <p id="arrow"></p>

    <script>
        let message;
        message= ()=>{
            return "I am an arrow function!";
        }       
        document.getElementById('arrow').innerHTML = message();
</script>    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>activite 7 class App avec évènement</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <script type="text/babel">
 class App extends React.Component {    
     constructor(props){
         super(props);
         this.state={
             msg:"Veuillez vous inscrire",
             ins:"Inscription"
         }
     }
     styles={
         fontStyle:"blod",
         color:"teal"
     }

     Changement=()=>{
         this.setState(
             {
                 msg:"Suivez les màj",
                 ins:"Déjà inscrit"
             }
         )
     }
     render(){  
         return(
        <div>
            <h1 style={this.styles}>{this.state.msg}</h1>
            <button onClick={this.Changement}>{this.state.ins}</button>
        </div>
    ) 
     }   
 }
    const elt =<App/>;
    ReactDOM.render(elt,document.getElementById("root"));
</script>
<div id="root"></div>
    
</body>
</html>
